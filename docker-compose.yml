version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: pavira_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - pavira_network

  # Node Express Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    deploy:
      replicas: 2
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/pavira-signature
      - JWT_SECRET=super_secret_jwt_token_for_pavira_signature_luxury
      - JWT_EXPIRE=30d
      - GST_RATE=18
      - EMAIL_HOST=smtp.mailtrap.io
      - EMAIL_PORT=2525
      - EMAIL_SECURE=false
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - pavira_network

  # Nginx Load Balancer / Reverse Proxy Service
  nginx:
    image: nginx:alpine
    container_name: pavira_load_balancer
    restart: always
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - pavira_network

  # Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pavira_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - pavira_network

volumes:
  mongodb_data:

networks:
  pavira_network:
    driver: bridge
